<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="title" content="Spotify Tracker by Tzur Soffer" />
    <meta name="description" content="Keep track of your Spotify listening habits with this Spotify Tracker." />
    <title>Spotify Tracker by Tzur Soffer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Spotify Tracker by Tzur Soffer</div>
      <a id="github-link" 
        href="https://github.com/TzurSoffer/SpotifyStatsTracker" 
        target="_blank" 
        rel="noopener noreferrer">
        ⭐ on GitHub
      </a>
      <div id="version-badge" class="version-badge" style="display:none;">
        <span id="version-badge-text"></span>
      </div>
      <nav class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/top-songs">Top Songs</a>
        <a href="/top-artists">Top Artists</a>
        <a href="{{ url_for('importPage') }}">Import</a>
        <a href="/login">Logout</a>
      </nav>
    </header>

    <main class="page">{% block content %}{% endblock %}</main>
    <script>
      (function(){
        const badge = document.getElementById('version-badge');
        const textEl = document.getElementById('version-badge-text');

        function hideBadge(){
          badge.style.display = 'none';
        }
        function checkVersion(){
          fetch('/version_status').then(r=>r.json()).then(data=>{
            if(data && data.latest){
              textEl.textContent = `New version: ${data.latest} (you: ${data.current})`;
              badge.style.display = 'inline-flex';
            } else {
              hideBadge();
            }
          }).catch(()=>{});
        }

        checkVersion();
        setInterval(checkVersion, 15 * 60 * 1000);
      })();
    </script>
  </body>
</html>
