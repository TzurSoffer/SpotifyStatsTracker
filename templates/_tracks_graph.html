<section class="activity-panel">
  <div class="activity-panel-header">
    <div>
      <h2>Activity</h2>
    </div>
  </div>

  {% if heatmapSeries and barSeries %}
    <div class="activity-section">
      <div class="activity-section-header">
        <div class="activity-section-title">
          <h3>{{ barSeriesLabel }}</h3>
        </div>
        <div class="activity-detail activity-detail-bar" id="activityBarDetail">Hover a bar to see play count and play time.</div>
      </div>
      <div class="activity-bar-chart-wrap">
        <div class="activity-bar-chart" id="activityBarChart" aria-label="Listening bar graph"></div>
      </div>
      <div class="activity-legend activity-legend-bar" aria-label="Bar graph legend">
        <span class="activity-legend-key"><span class="activity-legend-line activity-legend-line-plays"></span> Plays</span>
        <span class="activity-legend-key"><span class="activity-legend-line activity-legend-line-time"></span> Time listened</span>
        <span class="activity-legend-key"><span class="activity-legend-swatch activity-legend-swatch-bar"></span> Daily bucket</span>
      </div>
    </div>

    <div class="activity-section">
      <div class="activity-section-header">
        <div class="activity-section-title">
          <h3>Heatmap</h3>
          <label class="activity-year-picker" for="heatmapYearSelect">
            <span>Year</span>
            <select id="heatmapYearSelect" name="heatmapYear">
              {% for year in heatmapYears %}
                <option value="{{ year }}" {% if year == selectedHeatmapYear %}selected{% endif %}>{{ year }}</option>
              {% endfor %}
            </select>
          </label>
        </div>
        <div class="activity-detail activity-detail-heatmap" id="activityHeatmapDetail">Hover a day to see play count and play time.</div>
      </div>
      <div class="activity-heatmap-wrap">
        <div class="activity-heatmap" id="activityHeatmap" aria-label="Daily listening contribution graph"></div>
      </div>
      <div class="activity-legend activity-legend-heatmap" aria-label="Heatmap intensity legend">
        <span>Less</span>
        <span class="activity-legend-swatch level-0" title="No plays"></span>
        <span class="activity-legend-swatch level-1" title="Low activity"></span>
        <span class="activity-legend-swatch level-2" title="Medium activity"></span>
        <span class="activity-legend-swatch level-3" title="High activity"></span>
        <span class="activity-legend-swatch level-4" title="Peak activity"></span>
        <span>More</span>
      </div>
    </div>

    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const heatmapSeries = {{ heatmapSeries | tojson }};
        const barSeries = {{ barSeries | tojson }};
        const heatmapYears = {{ heatmapYears | tojson }};
        const selectedHeatmapYear = {{ selectedHeatmapYear | tojson }};
        const heatmapYearSelect = document.getElementById('heatmapYearSelect');
        const heatmapEl = document.getElementById('activityHeatmap');
        const barChartEl = document.getElementById('activityBarChart');
        const heatmapDetailEl = document.getElementById('activityHeatmapDetail');
        const barDetailEl = document.getElementById('activityBarDetail');
        const activityPanel = document.querySelector('.activity-panel');
        const heatmapWrap = heatmapEl?.parentElement;
        const heatmapSection = heatmapEl?.closest('.activity-section');

        if (!heatmapEl || !barChartEl || !heatmapDetailEl || !barDetailEl || !activityPanel || !heatmapSeries.length || !barSeries.length) {
          return;
        }

        const svgNamespace = 'http://www.w3.org/2000/svg';
        const dayMs = 24 * 60 * 60 * 1000;
        const heatmapLookup = new Map(heatmapSeries.map((item) => [item.date, item]));

        const formatDurationMs = (milliseconds) => {
          const totalSeconds = Math.max(0, Math.round(milliseconds / 1000));
          const hours = Math.floor(totalSeconds / 3600);
          const minutes = Math.floor((totalSeconds % 3600) / 60);
          const seconds = totalSeconds % 60;

          if (hours > 0) {
            return `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
          }

          return `${minutes}:${String(seconds).padStart(2, '0')}`;
        };

        const formatDateKey = (date) => {
          const year = String(date.getFullYear());
          const month = String(date.getMonth() + 1).padStart(2, '0');
          const day = String(date.getDate()).padStart(2, '0');
          return `${year}-${month}-${day}`;
        };

        const buildHeatmapYearSeries = (year) => {
          const selectedYear = Number(year);
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const isCurrentYear = selectedYear === today.getFullYear();
          const start = new Date(selectedYear, 0, 1);
          start.setHours(0, 0, 0, 0);
          const end = new Date(selectedYear, 11, 31);
          end.setHours(0, 0, 0, 0);
          const displayStart = isCurrentYear ? new Date(today.getTime() - (364 * dayMs)) : start;
          const displayEnd = isCurrentYear ? today : end;

          const firstSunday = new Date(displayStart);
          firstSunday.setDate(displayStart.getDate() - displayStart.getDay());
          firstSunday.setHours(0, 0, 0, 0);

          const weekCount = Math.max(1, Math.round((displayEnd - firstSunday) / dayMs / 7) + 1);
          const items = [];

          for (let current = new Date(displayStart); current <= displayEnd; current.setDate(current.getDate() + 1)) {
            current.setHours(0, 0, 0, 0);
            const dateKey = formatDateKey(current);
            const source = heatmapLookup.get(dateKey);
            const item = source ? { ...source } : {
              date: dateKey,
              dateText: current.toLocaleDateString(undefined, { month: 'short', day: '2-digit' }),
              tooltipDate: current.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: '2-digit', year: 'numeric' }),
              playCount: 0,
              totalTimeMs: 0,
              totalTimeText: '0ms',
            };

            const offsetDays = Math.round((current.getTime() - firstSunday.getTime()) / dayMs);
            const weekIndex = Math.floor(offsetDays / 7);

            items.push({
              ...item,
              date: dateKey,
              dateText: current.toLocaleDateString(undefined, { month: 'short', day: '2-digit' }),
              tooltipDate: current.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: '2-digit', year: 'numeric' }),
              weekIndex,
              rowIndex: current.getDay() + 1,
            });
          }

          return { items, weekCount };
        };

        const setHeatmapDetail = (item) => {
          heatmapDetailEl.innerHTML = `
            <strong>${item.tooltipDate}</strong>
            <span>${item.playCount} plays · ${item.totalTimeText}</span>
          `;
        };

        const setBarDetail = (item) => {
          barDetailEl.innerHTML = `
            <strong>${item.tooltipDate}</strong>
            <span>${item.playCount} plays · ${item.totalTimeText}</span>
          `;
        };

        const clearActive = (elements) => {
          elements.forEach((element) => element.classList.remove('is-active'));
        };

        const renderHeatmap = (year) => {
          const { items, weekCount } = buildHeatmapYearSeries(year);
          const maxPlays = Math.max(...items.map((item) => item.playCount), 1);
          const cells = [];
          const availableWidth = Math.max(1, heatmapSection?.clientWidth || heatmapWrap?.clientWidth || activityPanel.clientWidth - 4);
          const heatmapGap = 3;
          const cellSize = Math.max(4, Math.floor((availableWidth - ((weekCount - 1) * heatmapGap)) / weekCount));

          heatmapEl.style.setProperty('--activity-cell-size', `${cellSize}px`);
          heatmapEl.style.setProperty('--heatmap-week-count', `${weekCount}`);
          heatmapEl.replaceChildren();

          items.forEach((item) => {
            const intensity = item.playCount <= 0 ? 0 : Math.min(4, Math.max(1, Math.ceil((item.playCount / maxPlays) * 4)));
            const cell = document.createElement('button');
            cell.type = 'button';
            cell.className = `activity-day level-${intensity}`;
            cell.style.gridColumn = String(item.weekIndex + 1);
            cell.style.gridRow = String(item.rowIndex);
            cell.setAttribute('aria-label', `${item.tooltipDate}: ${item.playCount} plays, ${item.totalTimeText}`);
            cell.innerHTML = `<span class="activity-day-label">${item.dateText}</span>`;
            cell.addEventListener('mouseenter', () => {
              clearActive(cells);
              cell.classList.add('is-active');
              setHeatmapDetail(item);
            });
            cell.addEventListener('focus', () => {
              clearActive(cells);
              cell.classList.add('is-active');
              setHeatmapDetail(item);
            });
            heatmapEl.appendChild(cell);
            cells.push(cell);
          });

          const defaultIndex = items.findIndex((item) => item.playCount > 0);
          if (defaultIndex >= 0) {
            cells[defaultIndex]?.classList.add('is-active');
            setHeatmapDetail(items[defaultIndex]);
          } else {
            const lastIndex = items.length - 1;
            cells[lastIndex]?.classList.add('is-active');
            setHeatmapDetail(items[lastIndex]);
          }
        };

        const renderBarChart = (series) => {
          const maxPlays = Math.max(...series.map((item) => item.playCount), 1);
          const maxTimeMs = Math.max(...series.map((item) => item.totalTimeMs), 1);
          const width = Math.max(1, activityPanel.clientWidth);
          const height = 280;
          const padding = { top: 22, right: 30, bottom: 58, left: 34 };
          const plotWidth = Math.max(1, width - padding.left - padding.right);
          const plotHeight = Math.max(1, height - padding.top - padding.bottom);
          const bandWidth = plotWidth / Math.max(series.length, 1);
          const barWidth = Math.max(6, Math.min(24, bandWidth * 0.65));
          const playTickValues = [0, Math.max(1, Math.ceil(maxPlays / 2)), maxPlays];
          const timeTickValues = [0, Math.max(1, Math.ceil(maxTimeMs / 2)), maxTimeMs];
          const rects = [];

          barChartEl.replaceChildren();

          const svg = document.createElementNS(svgNamespace, 'svg');
          svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
          svg.setAttribute('width', String(width));
          svg.setAttribute('height', String(height));
          svg.setAttribute('role', 'img');
          svg.setAttribute('aria-label', 'Listening activity graph');
          svg.classList.add('activity-bar-svg');

          const axesGroup = document.createElementNS(svgNamespace, 'g');
          axesGroup.setAttribute('class', 'activity-bar-axes');

          const plotLeft = padding.left;
          const plotRight = width - padding.right;
          const plotTop = padding.top;
          const plotBottom = height - padding.bottom;

          const addLine = (x1, y1, x2, y2, className) => {
            const line = document.createElementNS(svgNamespace, 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('class', className);
            axesGroup.appendChild(line);
          };

          addLine(plotLeft, plotTop, plotLeft, plotBottom, 'activity-axis-line');
          addLine(plotLeft, plotBottom, plotRight, plotBottom, 'activity-axis-line');
          addLine(plotRight, plotTop, plotRight, plotBottom, 'activity-axis-line');

          const leftAxisLabel = document.createElementNS(svgNamespace, 'text');
          leftAxisLabel.setAttribute('x', plotLeft - 44);
          leftAxisLabel.setAttribute('y', plotBottom - (plotHeight / 2));
          leftAxisLabel.setAttribute('text-anchor', 'middle');
          leftAxisLabel.setAttribute('transform', `rotate(-90 ${plotLeft - 44} ${plotBottom - (plotHeight / 2)})`);
          leftAxisLabel.setAttribute('class', 'activity-axis-title');
          leftAxisLabel.textContent = 'Count';
          axesGroup.appendChild(leftAxisLabel);

          const rightAxisLabel = document.createElementNS(svgNamespace, 'text');
          rightAxisLabel.setAttribute('x', plotRight + 74);
          rightAxisLabel.setAttribute('y', plotBottom - (plotHeight / 2));
          rightAxisLabel.setAttribute('text-anchor', 'middle');
          rightAxisLabel.setAttribute('transform', `rotate(90 ${plotRight + 74} ${plotBottom - (plotHeight / 2)})`);
          rightAxisLabel.setAttribute('class', 'activity-axis-title');
          rightAxisLabel.textContent = 'Time played';
          axesGroup.appendChild(rightAxisLabel);

          playTickValues.forEach((value) => {
            const y = plotBottom - ((value / maxPlays) * plotHeight);
            addLine(plotLeft - 4, y, plotLeft, y, 'activity-tick-line');
            const text = document.createElementNS(svgNamespace, 'text');
            text.setAttribute('x', plotLeft - 12);
            text.setAttribute('y', y + 4);
            text.setAttribute('text-anchor', 'end');
            text.setAttribute('class', 'activity-axis-label');
            text.textContent = String(value);
            axesGroup.appendChild(text);
          });

          timeTickValues.forEach((value) => {
            const y = plotBottom - ((value / maxTimeMs) * plotHeight);
            addLine(plotRight, y, plotRight + 4, y, 'activity-tick-line');
            const text = document.createElementNS(svgNamespace, 'text');
            text.setAttribute('x', plotRight + 12);
            text.setAttribute('y', y + 4);
            text.setAttribute('text-anchor', 'start');
            text.setAttribute('class', 'activity-axis-label');
            text.textContent = value === 0 ? '0' : formatDurationMs(value);
            axesGroup.appendChild(text);
          });

          const playPathPoints = [];
          const timePathPoints = [];

          series.forEach((item, index) => {
            const centerX = plotLeft + (bandWidth * (index + 0.5));
            const playHeight = (item.playCount / maxPlays) * plotHeight;
            const timeHeight = (item.totalTimeMs / maxTimeMs) * plotHeight;
            const barX = centerX - (barWidth / 2);
            const playY = plotBottom - playHeight;
            const timeY = plotBottom - timeHeight;

            playPathPoints.push(`${centerX},${playY}`);
            timePathPoints.push(`${centerX},${timeY}`);

            const rect = document.createElementNS(svgNamespace, 'rect');
            rect.setAttribute('x', barX);
            rect.setAttribute('y', playY);
            rect.setAttribute('width', barWidth);
            rect.setAttribute('height', Math.max(playHeight, 1));
            rect.setAttribute('rx', '6');
            rect.setAttribute('class', 'activity-bar-rect');
            rect.setAttribute('tabindex', '0');
            rect.setAttribute('role', 'button');
            rect.setAttribute('aria-label', `${item.tooltipDate}: ${item.playCount} plays, ${item.totalTimeText}`);
            rect.addEventListener('mouseenter', () => {
              clearActive(rects);
              rect.classList.add('is-active');
              setBarDetail(item);
            });
            rect.addEventListener('focus', () => {
              clearActive(rects);
              rect.classList.add('is-active');
              setBarDetail(item);
            });
            svg.appendChild(rect);
            rects.push(rect);

            const point = document.createElementNS(svgNamespace, 'circle');
            point.setAttribute('cx', centerX);
            point.setAttribute('cy', timeY);
            point.setAttribute('r', '3.5');
            point.setAttribute('class', 'activity-time-point');
            svg.appendChild(point);

            const label = document.createElementNS(svgNamespace, 'text');
            label.setAttribute('x', centerX);
            label.setAttribute('y', height - 22);
            label.setAttribute('text-anchor', 'middle');
            label.setAttribute('class', 'activity-bar-label-text');
            label.textContent = item.dateText;
            svg.appendChild(label);
          });

          const playLine = document.createElementNS(svgNamespace, 'polyline');
          playLine.setAttribute('points', playPathPoints.join(' '));
          playLine.setAttribute('class', 'activity-play-line');
          svg.appendChild(playLine);

          const timeLine = document.createElementNS(svgNamespace, 'polyline');
          timeLine.setAttribute('points', timePathPoints.join(' '));
          timeLine.setAttribute('class', 'activity-time-line');
          svg.appendChild(timeLine);

          svg.appendChild(axesGroup);
          barChartEl.appendChild(svg);

          const defaultIndex = series.findIndex((item) => item.playCount > 0);
          if (defaultIndex >= 0) {
            rects[defaultIndex]?.classList.add('is-active');
            setBarDetail(series[defaultIndex]);
          } else if (series.length > 0) {
            rects[series.length - 1]?.classList.add('is-active');
            setBarDetail(series[series.length - 1]);
          }
        };

        const renderCharts = () => {
          renderHeatmap(Number(heatmapYearSelect?.value || selectedHeatmapYear));
          renderBarChart(barSeries);
        };

        heatmapYearSelect?.addEventListener('change', () => {
          renderHeatmap(Number(heatmapYearSelect.value));
        });

        renderCharts();

        if (window.ResizeObserver) {
          const resizeObserver = new ResizeObserver(() => {
            window.requestAnimationFrame(renderCharts);
          });

          resizeObserver.observe(activityPanel);
        } else {
          window.addEventListener('resize', () => {
            window.requestAnimationFrame(renderCharts);
          });
        }
      });
    </script>
  {% else %}
    <p class="loading">No listening activity found for this interval.</p>
  {% endif %}
</section>
